<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD</title>
  <style>
    * {
      background-color: rgb(0, 0, 0);
      color: white;

    }

    ul li {
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      height: 50vh;
    }
  </style>
</head>

<body>
  <div><textarea id="names" spellcheck="false"></textarea></div>
  <div><button id="butt">save</button>&#160;<button id="butt1">delete</button>&#160;<button
      id="saven">saven</button>&#160;<button id="deleten">deleten</button>&#160;<button
      id="badmsg">bdmsg</button>&#160;<button id="badmsgd">db</button></div>

  <script>
    let txt = document.getElementById("names");
    let button1 = document.getElementById("butt");
    let button2 = document.getElementById("butt1");
    let button3 = document.getElementById("saven");
    let button4 = document.getElementById("deleten");
    let button5 = document.getElementById("badmsg");
    let button6 = document.getElementById("badmsgd");
    let ul = document.createElement("ul");
    let namesGit = new Set();
    let namesPhp = new Set();
    document.body.append(ul);
    function addName(val) {
      return fetch("https://tuundun.x10.mx/", {
        method: "POST",
        body: new URLSearchParams({
          "qury": `${val}`,
          "action": "add"
        })
      })
    }
    function deleteName(val) {
      return fetch('https://tuundun.x10.mx/', {
        method: 'POST',
        body: new URLSearchParams({
          "qury": `${val}`,
          "action": "delete"
        })
      })
    }
    function saveN(val) {
      return fetch("https://tuundun.x10.mx/", {
        method: "POST",
        body: new URLSearchParams({
          "qury": `${val}`,
          "action": "addn"
        })
      })
    }
    function deleteN(val) {
      return fetch('https://tuundun.x10.mx/', {
        method: 'POST',
        body: new URLSearchParams({
          "qury": `${val}`,
          "action": "deleten"
        })
      })
    }
    function postBadMessage(val) {
      return fetch('https://tuundun.x10.mx/', {
        method: 'POST',
        body: new URLSearchParams({
          "qury": `${val}`,
          "action": "bdmsg"
        })
      })
    }
    function deleteBadMessage(val) {
      return fetch('https://tuundun.x10.mx/', {
        method: 'POST',
        body: new URLSearchParams({
          "qury": `${val}`,
          "action": "bdmsgd"
        })
      })
    }
    button1.onclick = function () {
      ul.innerHTML = ""
      let arr = txt.value.trim().split(/\s+/);
      let mp = arr.map(x => addName(x))
      Promise.all(mp).then(e => {
        let rr = []
        e.forEach(ele => {
          rr.push(ele.text())
        });
        return rr
      }).then(arr => {
        Promise.all(arr).then(r => {
          r.forEach(e => {
            let li = document.createElement("li");
            li.innerText = e;
            ul.append(li)
            if (e.includes("added")) {
              window.parent.postMessage(e, 'https://www.kalamngychat.com');
            }
          })
        })
      })
    }
    button2.onclick = function () {
      ul.innerHTML = ""
      let arr = txt.value.trim().split(/\s+/);
      let mp = arr.map(x => deleteName(x))
      Promise.all(mp).then(e => {
        let rr = []
        e.forEach(ele => {
          rr.push(ele.text())
        });
        return rr
      }).then(arr => {
        Promise.all(arr).then(r => {
          r.forEach(e => {
            let li = document.createElement("li");
            li.innerText = e;
            ul.append(li)
            if (e.includes("removed")) {
              window.parent.postMessage(e, 'https://www.kalamngychat.com');
            }
          })
        })
      })
    }

    button3.onclick = function () {
      ul.innerHTML = ""
      let arr = txt.value.trim().split(/\s+/);
      let mp = arr.map(x => saveN(x))
      Promise.all(mp).then(e => {
        let rr = []
        e.forEach(ele => {
          rr.push(ele.text())
        });
        return rr
      }).then(arr => {
        Promise.all(arr).then(r => {
          r.forEach(e => {
            let li = document.createElement("li");
            li.innerText = e;
            ul.append(li)
          })
        })
      })
    }

    button4.onclick = function () {
      ul.innerHTML = ""
      let arr = txt.value.trim().split(/\s+/);
      let mp = arr.map(x => deleteN(x))
      Promise.all(mp).then(e => {
        let rr = []
        e.forEach(ele => {
          rr.push(ele.text())
        });
        return rr
      }).then(arr => {
        Promise.all(arr).then(r => {
          r.forEach(e => {
            let li = document.createElement("li");
            li.innerText = e;
            ul.append(li)
          })
        })
      })
    }

    button5.onclick = async function () {
      ul.innerHTML = "";
      let msg = txt.value;
      let response = await postBadMessage(msg);
      let str = await response.text();
      let li = document.createElement("li");
      li.innerText = str;
      ul.append(li)
    }

    button6.onclick = async function () {
      ul.innerHTML = "";
      let msg = txt.value;
      let response = await deleteBadMessage(msg);
      let str = await response.text();
      let li = document.createElement("li");
      li.innerText = str;
      ul.append(li)
    }
    async function comparing() {
      let fetchedObject = await fetch(`https://api.github.com/repos/alisodsin/alisodsin.github.io/contents/femaleNames.json`);
      let txtt = await fetchedObject.text();
      let txtObject = JSON.parse(txtt);
      shrr = txtObject.sha;
      let json = decodeURIComponent(atob(txtObject.content));
      namesGit = new Set(JSON.parse(json));
      namesGit.delete(null);
      namesGit.delete(undefined);
      namesGit.delete("");
      let fetched = await fetch(`https://tuundun.x10.mx/femaleNames.json`);
      let arr = await fetched.json();
      namesPhp = new Set(arr)
      namesPhp.delete(null);
      namesPhp.delete(undefined);
      namesPhp.delete("");
      if (namesGit.size > namesPhp.size) {

        txt.value = `gitF > PhpF by ${namesGit.size - namesPhp.size}`

      } else if (namesGit.size < namesPhp.size) {
        txt.value = `gitF < PhpF by ${namesPhp.size - namesGit.size}`
      }
      else {
        txt.value = `gitF = PhpF = ${namesGit.size}`
      }

    }
    comparing();
  </script>

</body>

</html>
