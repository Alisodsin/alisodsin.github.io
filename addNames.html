<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD</title>
  <style>
    * {
      background-color: rgb(0, 0, 0);
      color: white;

    }

    textarea {
      width: 100%;
      height: 50vh;
    }
  </style>
</head>

<body>
  <p>php : Add Name(s)</p>
  <div><textarea id="names" spellcheck="false"></textarea></div>
  <div><button id="butt">save</button>&#160;<button id="butt1">delete</button></div>
  <script>
    let txt = document.getElementById("names");
    let button1 = document.getElementById("butt");
    let button2 = document.getElementById("butt1");
    let ul = document.createElement("ul");
    let framo = document.createElement("iframe");
    framo.src = "https://alisodsin.github.io/addNames1.html";
    // framo.style.display = "none";
    document.body.append(framo, ul);
    function posting(val) {
      return fetch("https://php.alisaber1.repl.co/", {
        method: "POST",
        body: new URLSearchParams({
          "qury": `${val}`
        })
      })
    }
    function deleteName(val) {
      return fetch('https://php.alisaber1.repl.co', {
        method: 'DELETE',
        body: new URLSearchParams({
          "qury": `${val}`
        })
      })
    }

    button1.onclick = function () {
      ul.innerHTML = ""
      let arr = txt.value.split(/\s{1,}/)
      let mp = arr.map(x => posting(x))
      Promise.all(mp).then(e => {
        let rr = []
        e.forEach(ele => {
          rr.push(ele.text())
        });
        return rr
      }).then(arr => {
        Promise.all(arr).then(r => {
          r.forEach(e => {
            let li = document.createElement("li");
            li.innerText = e;
            ul.append(li)
            if (e.includes("added")) {
              window.parent.postMessage(e, 'https://www.kalamngychat.com');
              framo.contentWindow.postMessage(e, "https://alisodsin.github.io");
            }
          })
        })
      })
    }
    button2.onclick = function () {
      ul.innerHTML = ""
      let arr = txt.value.split(/\s{1,}/)
      let mp = arr.map(x => deleteName(x))
      Promise.all(mp).then(e => {
        let rr = []
        e.forEach(ele => {
          rr.push(ele.text())
        });
        return rr
      }).then(arr => {
        Promise.all(arr).then(r => {
          r.forEach(e => {
            let li = document.createElement("li");
            li.innerText = e;
            ul.append(li)
            if (e.includes("removed")) {
              window.parent.postMessage(e, 'https://www.kalamngychat.com');
              framo.contentWindow.postMessage(e, "https://alisodsin.github.io");
            }
          })
        })
      })
    }
  </script>

</body>

</html>
