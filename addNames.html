<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <style>
    * {
      background-color: black;
      color: white;
    }
  </style>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>servercontrol</title>
</head>

<body>
  <p id="act">updatefemales</p>
  <div>
    <textarea disabled id="inputs" cols="20" rows="3"></textarea>
  </div>
  <div>
    <button id="s">save</button>&#160;&#160;<button id="d">delete</button>&#160;&#160;<button id="p">post</button>
  </div>
  <ul id="ol"></ul>
  <script>
    let textarea = document.getElementById("inputs"),
      action = document.getElementById("act"),
      femaleNames = new Set(),
      males = new Set(),
      messages = new Set(),
      save = document.getElementById("s"),
      dalet = document.getElementById("d"),
      postt = document.getElementById("p"),
      ol = document.getElementById("ol");
    action.onclick = function () {
      if (this.innerText == "updatefemales") {
        this.innerText = "updatemales"
      }
      else if (this.innerText == "updatemales") {
        this.innerText = "updatemessages"
      }
      else {
        this.innerText = "updatefemales"
      }
    }
    function post(q) {
      return fetch('https://tuundun.x10.mx/', {
        method: 'POST',
        body: new URLSearchParams({
          "qury": JSON.stringify(q),
          "action": action.innerText
        })
      })
    }
    save.onclick = function () {
      ol.innerHTML = "";
      let li = document.createElement("li");
      if (textarea.value != "") {
        if (action.innerText == "updatefemales") {
          if (femaleNames.has(textarea.value.trim().toLowerCase())) {
            li.innerText = `${textarea.value.trim().toLowerCase()} : already exists in femaleNames`;
            ol.append(li);
          }
          else {
            femaleNames.add(textarea.value.trim().toLowerCase())
            li.innerText = `${textarea.value.trim().toLowerCase()} : added to femaleNames`;
            ol.append(li);
          }
        }
        else if (action.innerText == "updatemales") {
          if (males.has(textarea.value.trim().toLowerCase())) {
            li.innerText = `${textarea.value.trim().toLowerCase()} : already exists in notwanted names`;
            ol.append(li);
          }
          else {
            males.add(textarea.value.trim().toLowerCase())
            li.innerText = `${textarea.value.trim().toLowerCase()} : added to notwanted names`;
            ol.append(li);
          }

        }
        else if (action.innerText == "updatemessages") {
          if (messages.has(textarea.value.trim().toLowerCase())) {
            li.innerText = `${textarea.value.trim().toLowerCase()} : already exists in messages`;
            ol.append(li);
          }
          else {
            messages.add(textarea.value.trim().toLowerCase())
            li.innerText = `${textarea.value.trim().toLowerCase()} : added to messages`;
            ol.append(li);
          }

        }
      }
      else {
        li.innerText = `there is no input`;
        ol.append(li);
      }
    }


    dalet.onclick = function () {
      ol.innerHTML = "";
      let li = document.createElement("li");
      if (textarea.value != "") {
        if (action.innerText == "updatefemales") {
          if (femaleNames.has(textarea.value.trim().toLowerCase())) {
            femaleNames.delete(textarea.value.trim().toLowerCase())
            li.innerText = `${textarea.value.trim().toLowerCase()} : delted from femaleNames`;
            ol.append(li);
          }
          else {
            li.innerText = `${textarea.value.trim().toLowerCase()} : not found in femaleNames`;
            ol.append(li);
          }
        }
        else if (action.innerText == "updatemales") {
          if (males.has(textarea.value.trim().toLowerCase())) {
            males.delete(textarea.value.trim().toLowerCase())
            li.innerText = `${textarea.value.trim().toLowerCase()} : deleted from notwanted names`;
            ol.append(li);
          }
          else {
            li.innerText = `${textarea.value.trim().toLowerCase()} : not found in notwanted names`;
            ol.append(li);
          }

        }
        else if (action.innerText == "updatemessages") {
          if (messages.has(textarea.value.trim().toLowerCase())) {
            messages.delete(textarea.value.trim().toLowerCase())
            li.innerText = `${textarea.value.trim().toLowerCase()} : deleted from  messages`;
            ol.append(li);
          }
          else {
            li.innerText = `${textarea.value.trim().toLowerCase()} : not found in messages`;
            ol.append(li);
          }

        }
      }
      else {
        li.innerText = `there is no input`;
        ol.append(li);
      }
    }
    postt.onclick = function name() {
      ol.innerHTML = "";
      let li = document.createElement("li");
      if (action.innerText == "updatefemales") {
        post([...femaleNames]).then(e => e.text()).then(
          r => {
            li.innerText = r;
            ol.append(li);
          }
        )
      } else if (action.innerText == "updatemales") {
        post([...males]).then(e => e.text()).then(
          r => {
            li.innerText = r;
            ol.append(li);
          }
        )
      }
      else {
        post([...messages]).then(e => e.text()).then(
          r => {
            li.innerText = r;
            ol.append(li);
          }
        )
      }
    }
    async function fetchAll() {
      let fetched = await fetch(`https://tuundun.x10.mx/femaleNames.json`);
      let arr = await fetched.json();
      femaleNames = new Set(arr)
      femaleNames.delete(null);
      femaleNames.delete(undefined);
      femaleNames.delete("");
      fetched = await fetch(`https://tuundun.x10.mx/notwanted.json`);
      arr = await fetched.json();
      males = new Set(arr)
      males.delete(null);
      males.delete(undefined);
      males.delete("");
      fetched = await fetch(`https://tuundun.x10.mx/messages.json`);
      arr = await fetched.json();
      messages = new Set(arr)
      messages.delete(null);
      messages.delete(undefined);
      messages.delete("");
      textarea.disabled = false
    }

    fetchAll();

  </script>

</body>

</html>
