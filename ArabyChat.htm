<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArabyChat</title>
    <link rel="shortcut icon" href="./arby.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e272e 0%, #2f3542 100%);
            padding: 15px;
        }

        .login-container {
            background: rgba(45, 52, 54, 0.95);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            font-size: 2rem; 
            color: #dfe6e9;
            text-align: center;
            margin-bottom: 2rem;
            font-weight: bold;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem; 
        }

        input[type="text"],
        input[type="number"] {
            padding: 1rem;
            border: 1px solid #636e72;
            border-radius: 8px;
            font-size: 1.2rem; 
            width: 100%;
            outline: none;
            background: #353b48;
            color: #dfe6e9;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: #b2bec3;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #00a8ff;
            box-shadow: 0 0 8px rgba(0, 168, 255, 0.3);
        }

        button {
            padding: 1rem 1.2rem;
            border: none;
            border-radius: 8px;
            background: #00a8ff;
            color: #ffffff;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        button:hover {
            background: #0097e6;
        }

        .radio-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            color: #dfe6e9;
            font-size: 1.1rem;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        input[type="radio"] {
            accent-color: #00a8ff;
            transform: scale(1.2);
        }

        input[type="submit"] {
            padding: 1rem;
            border: none;
            border-radius: 8px;
            background: #00b894;
            color: #ffffff;
            cursor: pointer;
            font-size: 1.2rem; 
            transition: background 0.3s, transform 0.2s;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            background: #00a676;
            transform: translateY(-2px);
        }

        @media (max-width: 520px) {
            .login-container {
                margin: 1rem;
                padding: 2rem;
                max-width: 95%;
            }
            .title {
                font-size: 1.8rem;
            }
            input[type="text"],
            input[type="number"],
            input[type="submit"],
            .radio-group {
                font-size: 1.1rem;
            }
            input[type="submit"] {
                padding: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="title">شات عربى</div>
        <form id="frm" autocapitalize="none" method="post" action="https://araby.co/egypt/sub.php">
            <input type="text" name="nk" maxlength="15" placeholder="الإسم المستعار" list="nms" required>
            <datalist id="nms"></datalist>

            <input type="number" name="ag" placeholder="العمر" value="35" min="18" max="99" required>
            
            <div class="radio-group">
                <label>
                    <input type="radio" name="gd" value="1" checked>
                    <span>ذكر</span>
                </label>
                <label>
                    <input type="radio" name="gd" value="2">
                    <span>أنثى</span>
                </label>
            </div>
            <!-- Added Submit Button -->
            <input type="submit" value="دخول">
        </form>
    </div>
</body>
</html>
