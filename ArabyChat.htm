<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الانضمام إلى عربى شات</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23007bff%22/><text y=%22.7em%22 x=%2250%25%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22Arial%22>ع</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #1E1E1E;
            --text-color: #F5F5F5;
            --accent-color: #007bff;
            --border-color: #333;
            --hover-color: #0056b3;
            --error-color: #ff4d4d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-form-container {
            background-color: var(--secondary-bg);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 1px solid var(--border-color);
        }

        .logo-area {
            text-align: center;
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: bold;
            color: white;
            margin: 0 auto 15px;
        }

        h2 {
            margin: 0;
            font-size: 28px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input[type="text"],
        input[type="number"] {
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: #252525;
            color: white;
            font-size: 16px;
        }

        .buttons-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 10px;
            border-radius: 8px;
            background: #333;
            color: #ccc;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .gender-selection {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: #252525;
        }

        input[type="submit"] {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .error-message {
            color: var(--error-color);
            font-size: 13px;
            display: none;
        }

        .error-border {
            border-color: var(--error-color) !important;
        }
    </style>
</head>

<body>

    <form id="chatEntryForm" class="chat-form-container" method="post" action="https://araby.co/egypt/sub.php"
        novalidate>

        <div class="logo-area">
            <div class="logo-circle">ع</div>
            <h2>شات عربي</h2>
        </div>

        <div class="form-group">
            <label>الاسم المستعار</label>
            <input type="text" id="nicknameInput" name="nk" maxlength="15" list="nms">
            <datalist id="nms"></datalist>
            <div class="error-message" id="nicknameError">يرجى إدخال اسم مستعار صحيح</div>
        </div>

        <div class="buttons-group">
            <button type="button" id="changeName">الاسم التالي</button>
            <button type="button" id="nameRandom">اسم عشوائي</button>
        </div>

        <div class="form-group">
            <label>العمر</label>
            <input type="number" id="ageInput" name="ag" value="25" min="12" max="99">
            <div class="error-message" id="ageError">العمر يجب أن يكون بين 12 و 99</div>
        </div>

        <div class="gender-selection">
            <label><input type="radio" name="gn" value="m" checked> ذكر</label>
            <label><input type="radio" name="gn" value="f"> أنثى</label>
        </div>

        <input type="submit" value="دخول الدردشة الآن">
    </form>

    <script>
        const names = [
            "رومانسى", "صديق جاد", "غريب_الاطوار", "صافي الود", "صدى الصورة",
            "قلب من ورق", "شموس طيفك", "ساحر جفونك", "دنيا الحب", "مالك القلب",
            "الضوء الساطع", "معاند جروحه", "Killer smile", "عيش اللحظة",
            "لصمتي حكاية", "عيون الليل", "قلب من دهب", "روح الروح",
            "مميز للغاية", "ملك روحي", "شوق العمر", "همس القلوب"
        ];

        const nicknameInput = document.getElementById("nicknameInput");
        const ageInput = document.getElementById("ageInput");
        const nameDatalist = document.getElementById("nms");
        const form = document.getElementById("chatEntryForm");

        let currentNameIndex = 0;

        names.forEach(n => {
            const o = document.createElement("option");
            o.value = n;
            nameDatalist.appendChild(o);
        });

        nicknameInput.value = names[Math.floor(Math.random() * names.length)];

        document.getElementById("changeName").onclick = () => {
            currentNameIndex = names.indexOf(nicknameInput.value);
            currentNameIndex = (currentNameIndex + 1) % names.length;
            nicknameInput.value = names[currentNameIndex];
        };

        document.getElementById("nameRandom").onclick = () => {
            nicknameInput.value = names[Math.floor(Math.random() * names.length)];
        };

        form.addEventListener("submit", e => {
            let valid = true;

            nicknameInput.classList.remove("error-border");
            ageInput.classList.remove("error-border");
            nicknameError.style.display = "none";
            ageError.style.display = "none";

            if (nicknameInput.value.trim() === "") {
                nicknameInput.classList.add("error-border");
                nicknameError.style.display = "block";
                valid = false;
            }

            if (ageInput.value < 12 || ageInput.value > 99) {
                ageInput.classList.add("error-border");
                ageError.style.display = "block";
                valid = false;
            }

            if (!valid) e.preventDefault();
        });
    </script>

</body>

</html>
