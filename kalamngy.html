<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كلامنجى شات</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@500&family=Lalezar&family=Scheherazade&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="w3.css">
    <link rel="shortcut icon" href="./speak.png" type="image/x-icon">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Changa', sans-serif;
            font-size: 1.8rem; 
            color: #dfe6e9;
            text-align: center;
            margin: 0;
            text-decoration: none;
            font-weight: 500;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e272e 0%, #2f3542 100%);
            margin: 0;
            padding: 15px; 
        }

        .login-container {
            background: rgba(45, 52, 54, 0.95);
            padding: 4.5rem; 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%;
            max-width: 750px; 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
        }

        label {
            font-size: 2.5rem; 
            margin-bottom: 1.5rem; 
            display: block;
            color: #b2bec3;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3); 
        }

        input[type="text"] {
            width: 100%;
            padding: 1.6rem; 
            margin-bottom: 2.5rem; 
            border: 2px solid rgba(99, 110, 114, 0.6); 
            border-radius: 18px; 
            font-size: 2rem; 
            background: rgba(53, 59, 72, 0.85); 
            color: #dfe6e9;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #00a8ff;
            background: rgba(45, 52, 54, 0.95); 
            box-shadow: 0 0 18px rgba(0, 168, 255, 0.35); 
        }

        input[type="submit"] {
            padding: 1.6rem 4.5rem; 
            border: none;
            border-radius: 18px; 
            background: linear-gradient(135deg, #00a8ff 0%, #0097e6 100%);
            color: white;
            cursor: pointer;
            font-size: 2rem; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.2px; 
            box-shadow: 0 5px 18px rgba(0, 168, 255, 0.35); 
        }

        input[type="submit"]:hover {
            background: linear-gradient(135deg, #0097e6 0%, #00a8ff 100%);
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px rgba(0, 168, 255, 0.45); 
        }

        input[type="submit"]:active {
            transform: translateY(0);
            box-shadow: 0 3px 12px rgba(0, 168, 255, 0.3); 
        }

        @media (max-width: 768px) { 
            .login-container {
                margin: 1.5rem; 
                padding: 3rem; 
                max-width: 95%;
            }

            label {
                font-size: 2.2rem; 
            }

            input[type="text"],
            input[type="submit"] {
                font-size: 1.8rem; 
                padding: 1.4rem; 
            }
        }

        @media (max-width: 480px) {
             body {
                padding: 10px;
             }
            .login-container {
                padding: 2rem; 
            }
            label {
                font-size: 2rem;
            }
            input[type="text"],
            input[type="submit"] {
                font-size: 1.6rem; 
                padding: 1.2rem; 
            }
             input[type="submit"] {
                 padding: 1.2rem 3rem; 
             }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <form id="cgiirclogin" action="https://www.kalamngychat.com/chat-rooms/dardesh/" method="post" autocomplete="off">
            <label for="Nickname">الاسم المستعار</label>
            <input id="Nickname" dir="ltr" name="Nickname" type="text" required>
            <label for="room">الغرفه</label>
            <input id="room" name="Channel" type="text" value="#مصر" required>
            <input type="submit" value="ادخل" id="Submit">
        </form>
    </div>

    <script>
        const inpu = document.getElementById("room");
        const inpu1 = document.getElementById("Nickname");

        const randoms = () => {
            for (let f = 0; f < 100000000000; f++) {
                let ran = (Math.random() * 10000).toFixed();
                if (ran < 1000) continue;
                inpu1.value = `Kalamngy_${ran}`;
                break;
            }
        };

        const uniCharCode = (event) => {
            const char = event.which;
            const rooms = ["#مصر", "#رومانسية", "#كل_العرب", "#فلسطين", "#السعودية", "#الاردن"];
            if (char === 112 && inpu === document.activeElement) {
                const currentIndex = rooms.indexOf(inpu.value);
                const nextIndex = (currentIndex + 1) % rooms.length;
                inpu.value = rooms[nextIndex];
                event.preventDefault();
            } else if (char === 112 && inpu1 === document.activeElement) {
                randoms();
                event.preventDefault();
            }
        };

        inpu.addEventListener("keydown", uniCharCode);
        inpu1.addEventListener("keydown", uniCharCode);
        randoms();
    </script> 
</body>
</html>
